# -----------------------------------------------------------------------------
# Model parameters (distance thresholds, in meters)
# -----------------------------------------------------------------------------
# Override per prefecture via config.pref.<N>.properties if needed.

# Max walking distance for trip generation
max.walk.distance=3000

# Max station search distance (for nearest-station lookup)
max.station.search.distance=5000

# Trips below this distance skip transit routing (straight to car/walk/bike)
min.transit.distance=1000

# Max distance for destination search in activity generation
max.destination.search.distance=20000

# Max distance for school destination assignment
school.max.distance=5000

# -----------------------------------------------------------------------------
# Cost model (WebAPI mode choice — generalized cost comparison)
# -----------------------------------------------------------------------------

# Distance-based fare (yen per km) for car/road cost estimation
fare.per.kilometer=10

# Time value (yen per hour) — higher values favor faster modes
fare.per.hour=1000

# Base fare (yen) added to all transit trips
fare.init=200

# Fatigue multipliers — increase perceived cost of walking/cycling
# 1.0 = no penalty, higher = more costly (discourages that mode)
fatigue.walk=1.5
fatigue.bicycle=1.2

# Baseline car availability ratio (used when prefecture-specific car.<N> is missing)
car.availability=0.4

# -----------------------------------------------------------------------------
# Trajectory output
# -----------------------------------------------------------------------------

# Calendar year for trajectory output timestamps. Default: 2020.
trajectory.baseYear=2020

# -----------------------------------------------------------------------------
# Activity generation
# -----------------------------------------------------------------------------

# Earliest departure time for train-based trips (seconds from midnight; 18000 = 05:00)
train.service.start=18000

# Time discretization interval for activity scheduling (seconds; 900 = 15 min)
activity.time.interval=900

# Age threshold for senior-specific activity patterns
senior.age.threshold=65
