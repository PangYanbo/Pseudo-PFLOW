# =============================================================================
# Windows config — copy to config.local.properties before running
# =============================================================================
# Copy command:
#   Copy-Item src\main\resources\config.local.properties.windows.example `
#             src\main\resources\config.local.properties
#
# This file is gitignored. Never commit config.local.properties.
#
# IMPORTANT: Use forward slashes (/) in ALL paths, not backslashes (\).
# Java Properties does not handle backslashes correctly.
#
# API CREDENTIALS: Do NOT put credentials here.
# Set PFLOW_API_USER and PFLOW_API_PASS as Windows SYSTEM environment variables
# (System Properties > Advanced > Environment Variables > System variables).
# =============================================================================

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------

# Root data directory (all input datasets are under here)
root=C:/Pseudo-PFLOW/data/

# Processing input data (census, facility, railway, person, markov, etc.)
inputDir=C:/Pseudo-PFLOW/data/processing/

# Pipeline output (activity/, trip/, trajectory/ written here)
outputDir=C:/pflow_output/

# Bus stop GML zips (P11-22_XX_GML.zip per prefecture)
# Located under processing/ by default; uncomment to override
# busStopDir=C:/Pseudo-PFLOW/data/processing/bus_stop

