# -----------------------------------------------------------------------------
# API endpoints (CSIS WebAPI routing service)
# -----------------------------------------------------------------------------
# These URLs should not need changing unless the API moves.

api.createSessionURL=https://pflow-api.csis.u-tokyo.ac.jp/webapi/CreateSession
api.getRoadRouteURL=https://pflow-api.csis.u-tokyo.ac.jp/webapi/GetRoadRoute
api.getMixedRouteURL=https://pflow-api.csis.u-tokyo.ac.jp/webapi/GetMixedRoute

# -----------------------------------------------------------------------------
# API parameters (transit routing)
# -----------------------------------------------------------------------------

# Timetable date for transit routing (YYYYMMDD format)
api.appDate=20240401

# Station search radius in meters. API requires this parameter.
# Also used as the precheck radius (Feature A).
api.maxRadius=1000

# Max route alternatives returned by the API. All candidates are evaluated;
# the best is selected by api.transit.selection.
api.maxRoutes=6

# Transport mode for GetMixedRoute: 3 = bus-oriented (default), 1 = train-oriented.
api.transportCode=3

# How to select the best transit candidate from multiple API alternatives.
# Options: generalized_cost (default), min_time, min_fare, min_transfers
api.transit.selection=generalized_cost

# Penalty per transfer added to generalized cost (yen equivalent). Default 0.
# Set to e.g. 100 to penalize routes with many transfers.
api.transit.transferPenalty=0

# -----------------------------------------------------------------------------
# Session management
# -----------------------------------------------------------------------------

# Proactive session refresh interval (minutes). Default: 15.
# The API session expires after ~19 minutes of continuous use.
# Keep this below 19 to avoid mid-run expiry. 15 is safe.
api.sessionRefreshMinutes=15

# Transit stop reachability precheck (Feature A).
# When true, checks if transit stops exist near both origin and destination
# before calling GetMixedRoute. Saves ~2% of API calls in dense urban areas.
# Set to false to always call the API (useful for debugging).
api.precheckEnabled=true

